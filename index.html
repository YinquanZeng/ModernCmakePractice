<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Modern CMake 实践</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 主题 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  
  <!-- 高亮样式（必须） -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.css">
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Modern CMake Practice',
      repo: 'https://github.com/YinquanZeng/ModernCmakePractice',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,

      // 正确的别名配置（让 C++ / c++ / cpp 全都能高亮）
      alias: {
        'cpp': 'c++',
        'C++': 'c++'
      },

      // 官方正确高亮插件（不会冲突）
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            Prism.highlightAll();
          });
        }
      ]
    };
  </script>

  <!-- 👇 【正确顺序】绝对不能乱 -->
  <!-- 1. 先加载 Prism 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <!-- 2. 再加载语言高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cmake.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markdown.min.js"></script>
  <!-- 3. 最后加载 docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

</body>
</html>

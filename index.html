<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Modern CMake 实践</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <!-- 🔥 自定义淡绿色代码背景（护眼） -->
  <style>
    pre, code, .hljs {
      background-color: #f0fff0 !important; /* 淡绿底色 */
      color: #2c3e50 !important;           /* 文字深色，清晰可读 */
      border-radius: 6px !important;
      padding: 12px !important;
    }
    /* C++/CMake 关键字高亮颜色 */
    .hljs-keyword { color: #0066cc !important; }
    .hljs-string { color: #22863a !important; }
    .hljs-function { color: #6f42c1 !important; }
    .hljs-comment { color: #6a737d !important; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Modern CMake Practice',
      repo: 'https://github.com/YinquanZeng/ModernCmakePractice',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      noEmoji: true
    }
  </script>

  <!-- Docsify + 高亮插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/prism.min.js"></script>

  <!-- 语言包 -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cmake.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>

</body>
</html>
